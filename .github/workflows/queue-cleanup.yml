name: QueueJob Cleanup

on:
  # Daily at 03:00 UTC (off-hours for most timezones).
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Prune completed/failed QueueJob rows
        env:
          APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${APP_URL}/api/cron/queue-cleanup" \
            -H "Content-Type: application/json" \
            -H "x-app-secret: ${APP_SECRET}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "QueueJob cleanup failed with status $http_code"
            exit 1
          fi

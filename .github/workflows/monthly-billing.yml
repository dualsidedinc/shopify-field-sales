name: Monthly Usage Billing

on:
  # Run on the 1st of every month at 00:05 UTC.
  # The cron processes the PREVIOUS calendar month's BillingEvents.
  schedule:
    - cron: '5 0 1 * *'

  # Allow manual trigger (for backfills, retries, or testing).
  workflow_dispatch:

jobs:
  report-usage:
    runs-on: ubuntu-latest

    steps:
      - name: Report Monthly Usage to Shopify
        env:
          APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
        run: |
          echo "Reporting monthly usage at $(date -u)"

          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${APP_URL}/api/cron/billing" \
            -H "Content-Type: application/json" \
            -H "x-app-secret: ${APP_SECRET}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response code: $http_code"
          echo "Response body:"
          echo "$body" | jq '.' 2>/dev/null || echo "$body"

          if [ "$http_code" != "200" ]; then
            echo "Monthly billing failed with status $http_code"
            exit 1
          fi

          echo ""
          echo "=== Summary ==="
          echo "$body" | jq -r '.summary | "Shops: \(.shopsProcessed) | Success: \(.successful) | Errors: \(.errors) | Total: $\(.totalChargesCents / 100) | Backfilled events: \(.eventsBackfilled)"' 2>/dev/null || true

          echo "Monthly billing completed successfully"

      - name: Notify on Failure
        if: failure()
        run: |
          echo "Monthly billing failed! Check the logs above for details."
          # Add Slack/email notification here if needed
